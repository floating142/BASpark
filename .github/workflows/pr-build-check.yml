name: GNOME Extension PR Check

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check JS/JSON syntax
        run: |
          find gnome-extension/ -type f \( -name '*.js' -o -name '*.json' \) -exec node -c {} +

      - name: Validate metadata.json
        run: |
          test -f gnome-extension/baspark-desktop@baspark/metadata.json && jq . gnome-extension/baspark-desktop@baspark/metadata.json